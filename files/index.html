<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BestellApp</title>
    <link
      rel="shortcut icon"
      href="../assets/mobile/takeout-dining-onpress.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="styles/variables.css" />
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/standard.css" />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/responsive.css" />
    <script src="scripts/dishes.js"></script>
    <script src="scripts/template.js"></script>
    <script src="scripts/script.js"></script>
  </head>
  <body onload="initialise()">
    <header>
      <!-- Menüleiste -->
      <article class="menu_bar">
        <img
          src="../assets/icons/bestellapp-logo.svg"
          alt="Logo of BestellApp"
        />
        <img class="bars" src="../assets/icons/menu-bar.svg" alt="Menu Bar" />
      </article>
      <!-- Herobild -->
      <img
        src="../assets/images/header/hero-image.png"
        alt="Hero Image with Food"
      />
      <!-- Restaurant Icon -->
      <div class="restaurant_icon">
        <section class="restaurant_symbol">
          <img
            src="../assets/images/header/restaurant-logo.png"
            alt="Icon of BurgerHouse"
          />
        </section>
      </div>
      <!-- Restaurant Name und Titel -->
      <section class="restaurant_name">
        <h1><span>Burger</span>House</h1>
        <section class="restaurant_rating">
          <img src="../assets/icons/star.svg" alt="Rating Star" />
          <p class="rating"><b>4,1</b></p>
          <p class="users">(317)</p>
        </section>
      </section>
      <section class="subtitle">
        <h2>The best of Burgers, Pizza, and Greens, all in one great place.</h2>
      </section>
    </header>
    <!-- Main -->
    <main>
      <div class="main_menu_style">
        <div>
          <aside id="basket"></aside>
        </div>
        <article>
          <section class="category">
            <div>
              <img src="../assets/icons/burger-symbol.svg" alt="Burger Icon" />
              <h3>Burger & Sandwiches</h3>
            </div>
          </section>
          <section class="menu" id="burgersMenus"></section>
          <section class="category">
            <div>
              <img src="../assets/icons/pizza-symbol.svg" alt="Pizza Icon" />
              <h3>Pizza (30cm Ø)</h3>
            </div>
          </section>
          <section class="menu" id="pizzasMenus"></section>
          <section class="category">
            <div>
              <img src="../assets/icons/salad-symbol.svg" alt="Salad Icon" />
              <h3>Salad</h3>
            </div>
          </section>
          <section class="menu" id="saladsMenus"></section>
        </article>
      </div>
      <dialog id="orderConfirmed" onclick="closeDialog()">
        <article onclick="stopPropagation(event)">
          <section>
            <button class="close" id="closeButton" onclick="closeDialog()">
              X
            </button>
          </section>
          <section class="order_received">
            <img src="../assets/icons/order-symbol.svg" alt="Car is driving" />
            <h6>Oder confirmed!</h6>
            <p>Your food is on the way!</p>
          </section>
        </article>
      </dialog>
    </main>
    <!-- Footer -->
    <footer>
      <section class="footer_responsive">
        <div>
          <img src="../assets/mobile/home.svg" alt="Home Symbol" />
          <img src="../assets/mobile/person.svg" alt="Person Symbol" />
          <img src="../assets/mobile/takeout-dining.svg" alt="Dining Symbol" />
          <button class="responsive_basket" onclick="openBasket()">
            <img
              src="../assets/mobile/shopping-cart.svg"
              alt="Button for Basket"
            />
          </button>
        </div>
      </section>
      <section class="footer_classic">
        <div>
          <img src="../assets/icons/copyright.svg" alt="Copyright" />
          <p>2025 BurgerHouse</p>
        </div>
        <p><a href="imprint.html"></a>Imprint</p>
        <p>Cookie Preference</p>
      </section>
      <dialog id="basketDialog" onclick="closeBasket()">
        <aside
          class="basket_responsive"
          id="basketResponsive"
          onclick="stopPropagation(event)"
        ></aside>
      </dialog>
    </footer>
  </body>
</html>
