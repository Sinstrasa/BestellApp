<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BestellApp</title>
    <link
      rel="shortcut icon"
      href="../assets/icons/bestellapp-logo.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="styles/variables.css" />
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/standard.css" />
    <link rel="stylesheet" href="styles/style.css" />
    <script src="scripts/dishes.js"></script>
    <script src="scripts/template.js"></script>
    <script src="scripts/script.js"></script>
  </head>
  <body>
    <header>
      <!-- Menüleiste -->
      <article class="menu_bar">
        <img
          src="../assets/icons/bestellapp-logo.svg"
          alt="Logo of BestellApp"
        />
        <img src="../assets/icons/menu-bar.svg" alt="Menu Bar" />
      </article>
      <!-- Herobild -->
      <img
        src="../assets/images/header/hero-image.png"
        alt="Hero Image with Food"
      />
      <!-- Restaurant Icon -->
      <div class="restaurant_icon">
        <section class="restaurant_symbol">
          <img
            src="../assets/images/header/restaurant-logo.png"
            alt="Icon of BurgerHouse"
          />
        </section>
      </div>
      <!-- Restaurant Name und Titel -->
      <section class="restaurant_name">
        <h1><span>Burger</span>House</h1>
        <section class="restaurant_rating">
          <img src="../assets/icons/star.svg" alt="Rating Star" />
          <p class="rating"><b>4,1</b></p>
          <p class="users">(317)</p>
        </section>
      </section>
      <section class="subtitle">
        <h2>The best of Burgers, Pizza, and Greens, all in one great place.</h2>
      </section>
    </header>
    <!-- Main -->
    <main>
        <article>
          <section class="category">
            <img src="/assets/icons/burger-symbol.svg" alt="Burger Icon" />
            <h3>Burger & Sandwiches</h3>
          </section>
          <section class="menu">
            <section class="dish">
              <img src="/assets/images/burger/veggie.png" alt="Veggie Burger" />
              <section class="explanation">
                <div class="description">
                  <h4>Veggie mushroom black burger</h4>
                  <p>Mixed green salad, Tomatoes, Edamame, Mushrooms</p>
                </div>
                <div class="costs">
                  <p>16,90€</p>
                  <div>
                    <button>Added 1</button>
                  </div>
                </div>
              </section>
            </section>
          </section>
        </article>
    </main>
    <!-- Footer -->
    <footer>
      <div>
        <img src="/assets/icons/copyright.svg" alt="Copyright" />
        <p>2025 BurgerHouse</p>
      </div>
      <p><a href="imprint.html"></a>Imprint</p>
      <p>Cookie Preference</p>
    </footer>
  </body>
</html>
